# Font
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Layout
window_padding_width 10
scrollback_lines     20000
remember_window_size yes
confirm_os_window_close 0
hide_window_decorations yes
# enabled_layouts      splits
# map ctrl+shift+-     launch --location=hsplit
# map ctrl+shift+\\    launch --location=vsplit
map ctrl+shift+h     neighboring_window left
map ctrl+shift+l     neighboring_window right
map ctrl+shift+k     neighboring_window up
map ctrl+shift+j     neighboring_window down

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Reduce distractions
enable_audio_bell no
visual_bell_duration 0.0
background_opacity 1.0

# Selection
selection_foreground #F5EEE8
selection_background #33263B

# Cursor colors
cursor            #D0A9E5
cursor_text_color #0F1115

# Main colors
foreground #E3D9D2
background #0F1115

# Normal colors
color0  #15171C
color1  #EE8A7A
color2  #9AC47C
color3  #CDAA74
color4  #A995E8
color5  #D0A9E5
color6  #86B8C7
color7  #D2C8C2

# Bright colors
color8  #5A5660
color9  #F29A8B
color10 #ADD08E
color11 #D9C18F
color12 #B8A7F0
color13 #DEC2F0
color14 #9BC7D4
color15 #F4ECE6

# Tabs
active_tab_background   #31243A
active_tab_foreground   #F4ECE6
inactive_tab_background #15171C
inactive_tab_foreground #9D96A0
tab_bar_background      #0F1115

# URL visibility
url_color #C9A6E8

# Let ctrl+shift+arrows pass through to shell for word selection
map ctrl+shift+left no_op
map ctrl+shift+right no_op
